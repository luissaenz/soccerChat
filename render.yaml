services:
  - type: web
    name: soccer-chat-bot
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: python -m bot.main
    envVars:
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: OPENROUTER_API_KEY
        sync: false
      - key: OPENROUTER_MODEL
        value: openai/gpt-4o-mini
      - key: WEBHOOK_URL
        sync: false
      - key: PORT
        value: "8080"
      - key: DB_PATH
        value: /data/soccer.db
    disk:
      name: soccer-data
      mountPath: /data
      sizeGB: 1
